name: test-catnap
on:
  push:
  pull_request:
jobs:
  test-catnap:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4
      - name: "Setup Nim"
        uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: "stable"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: "Install dependencies"
        run: sudo apt-get install -y libpcre3 libpcre3-dev
      - name: "Build Catnap"
        run: nim debug
      - name: "Verify binary"
        run: bin/catnap -v
      - name: "Run Tests"
        run: |
          chmod +x scripts/*.sh
          cd scripts && ./test-commandline-args.sh && ./test-bad-configs.sh
