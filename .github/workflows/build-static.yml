name: Build Static Binary

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - target: x86_64-linux-musl
            artifact: catnap-linux-amd64
          - target: i686-linux-musl
            artifact: catnap-linux-amd32
          - target: aarch64-linux-musl
            artifact: catnap-linux-arm64
          - target: armv7l-linux-musleabihf
            artifact: catnap-linux-arm32

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Install Nim"
        uses: iffy/install-nim@v5

      - name: "Setup Nim"
        uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: "stable"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install musl cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

          TOOLCHAIN="${{ matrix.target }}-cross"

          if [ "${{ matrix.target }}" = "x86_64-linux-musl" ]; then
            # Native musl, musl-tools provides musl-gcc
            sudo ln -sf /usr/bin/musl-gcc /usr/local/bin/x86_64-linux-musl-gcc
          else
            # Cross toolchains from musl-cross-make GitHub releases
            wget --timeout=60 -q \
              "https://github.com/richfelker/musl-cross-make/releases/download/v0.9.9/${TOOLCHAIN}.tgz"
            tar xf "${TOOLCHAIN}.tgz"
            echo "$PWD/${TOOLCHAIN}/bin" >> $GITHUB_PATH
          fi

      - name: Verify compiler
        run: ${{ matrix.target }}-gcc --version

      - name: Set MUSLCC env
        run: echo "MUSLCC=${{ matrix.target }}-gcc" >> $GITHUB_ENV

      - name: Set CPU for Nim
        run: |
          case "${{ matrix.target }}" in
            x86_64*)  echo "NIM_CPU=amd64" >> $GITHUB_ENV ;;
            i686*)    echo "NIM_CPU=i386"  >> $GITHUB_ENV ;;
            aarch64*) echo "NIM_CPU=arm64" >> $GITHUB_ENV ;;
            armv7l*)  echo "NIM_CPU=arm"   >> $GITHUB_ENV ;;
          esac

      - name: Build PCRE1 static
        run: MUSLCC=${{ matrix.target }}-gcc nim installPcre

      - name: Build PCRE2 static
        run: MUSLCC=${{ matrix.target }}-gcc nim installPcre2

      - name: Build static binary
        run: nim static_release --cpu:${{ env.NIM_CPU }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/catnap
          retention-days: 30
