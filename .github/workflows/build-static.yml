name: Build Static Binary

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - target: x86_64-linux-musl
            muslcc: musl-gcc
            nim_cpu: amd64
            artifact: catnap-linux-amd64
          - target: i686-linux-musl
            muslcc: i686-linux-musl-gcc
            nim_cpu: i386
            artifact: catnap-linux-amd32
          - target: aarch64-linux-musl
            muslcc: aarch64-linux-musl-gcc
            nim_cpu: arm64
            artifact: catnap-linux-arm64
          - target: armv7l-linux-musleabihf
            muslcc: armv7l-linux-musleabihf-gcc
            nim_cpu: arm
            artifact: catnap-linux-arm32

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Install Nim"
        uses: iffy/install-nim@v5

      - name: "Setup Nim"
        uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: "stable"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install musl toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools

          if [ "${{ matrix.target }}" = "x86_64-linux-musl" ]; then
            echo "Native x86_64, musl-gcc already available via musl-tools"
          else
            TOOLCHAIN="${{ matrix.target }}-cross"
            echo "Downloading ${TOOLCHAIN} from musl.cc ..."
            wget --timeout=120 --tries=3 -q "https://musl.cc/${TOOLCHAIN}.tgz"
            tar xf "${TOOLCHAIN}.tgz"
            echo "$PWD/${TOOLCHAIN}/bin" >> $GITHUB_PATH
          fi

      - name: Verify compiler
        run: ${{ matrix.muslcc }} --version

      - name: Build PCRE1 static
        run: MUSLCC=${{ matrix.muslcc }} nim installPcre

      - name: Build PCRE2 static
        run: MUSLCC=${{ matrix.muslcc }} nim installPcre2

      - name: Build static binary
        run: MUSLCC=${{ matrix.muslcc }} nim static_release --cpu:${{ matrix.nim_cpu }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/catnap
          retention-days: 30
