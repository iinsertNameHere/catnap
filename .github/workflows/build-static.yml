name: Build Static Binary

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                include:
                    - target: x86_64-linux-musl
                      muslcc: musl-gcc
                      nim_cpu: amd64
                      artifact: catnap-linux-amd64
                      host: x86_64-linux-musl
                    - target: i686-unknown-linux-musl
                      muslcc: i686-unknown-linux-musl-gcc
                      nim_cpu: i386
                      artifact: catnap-linux-amd32
                      host: i686-linux-musl
                    - target: aarch64-unknown-linux-musl
                      muslcc: aarch64-unknown-linux-musl-gcc
                      nim_cpu: arm64
                      artifact: catnap-linux-arm64
                      host: aarch64-linux-musl
                    - target: armv7-unknown-linux-musleabihf
                      muslcc: armv7-unknown-linux-musleabihf-gcc
                      nim_cpu: arm
                      artifact: catnap-linux-arm32
                      host: armv7-linux-musleabihf

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: "Install Nim"
              uses: iffy/install-nim@v5

            - name: "Setup Nim"
              uses: jiro4989/setup-nim-action@v1
              with:
                  nim-version: "stable"
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install musl toolchain
              run: |
                  sudo apt-get update -q
                  sudo apt-get install -y musl-tools

                  if [ "${{ matrix.target }}" = "x86_64-linux-musl" ]; then
                    echo "Native x86_64, using musl-gcc from musl-tools"
                  else
                    # cross-tools/musl-cross releases on GitHub - not blocked in CI
                    BASE_URL="https://github.com/cross-tools/musl-cross/releases/latest/download"
                    TARBALL="${{ matrix.target }}.tar.xz"
                    echo "Downloading ${TARBALL} ..."
                    wget --timeout=120 --tries=3 -q "${BASE_URL}/${TARBALL}"
                    tar xf "${TARBALL}"
                    echo "$PWD/${{ matrix.target }}/bin" >> $GITHUB_PATH
                  fi

            - name: Verify compiler
              run: ${{ matrix.muslcc }} --version

            - name: Build PCRE1 static
              run: MUSLCC=${{ matrix.muslcc }} MUSL_TARGET=${{ matrix.host }} nim installPcre

            - name: Build PCRE2 static
              run: MUSLCC=${{ matrix.muslcc }} MUSL_TARGET=${{ matrix.host }} nim installPcre2

            - name: Build static binary
              run: MUSLCC=${{ matrix.muslcc }} MUSL_TARGET=${{ matrix.host }} CPU=${{ matrix.nim_cpu }} nim static_release

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact }}
                  path: bin/catnap
                  retention-days: 30
