name: Build Static Binary

on:
    workflow_dispatch:
        inputs:
            force:
                description: "Force release (ignore time + PR checks)"
                required: false
                default: "false"
    workflow_call:
        inputs:
            force:
                description: "Force release (ignore time + PR checks)"
                required: false
                default: "false"
                type: string
        outputs:
            artifacts_ready:
                description: "Whether static binaries were built"
                value: ${{ jobs.build.outputs.artifacts_ready }}

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                include:
                    - target: x86_64-linux-musl
                      muslcc: musl-gcc
                      nim_cpu: amd64
                      artifact: catnap-linux-x86_64
                      host: x86_64-linux-musl
                    - target: i686-unknown-linux-musl
                      muslcc: i686-unknown-linux-musl-gcc
                      nim_cpu: i386
                      artifact: catnap-linux-i686
                      host: i686-linux-musl
                    - target: aarch64-unknown-linux-musl
                      muslcc: aarch64-unknown-linux-musl-gcc
                      nim_cpu: arm64
                      artifact: catnap-linux-aarch64
                      host: aarch64-linux-musl
                    - target: armv7-unknown-linux-musleabihf
                      muslcc: armv7-unknown-linux-musleabihf-gcc
                      nim_cpu: arm
                      artifact: catnap-linux-armv7
                      host: armv7-linux-musleabihf

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: "Setup Nim"
              uses: jiro4989/setup-nim-action@v1
              with:
                  nim-version: "stable"
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install musl toolchain
              run: |
                  sudo apt-get update -q
                  sudo apt-get install -y musl-tools

                  if [ "${{ matrix.target }}" = "x86_64-linux-musl" ]; then
                    echo "Native x86_64, using musl-gcc from musl-tools"
                  else
                    # cross-tools/musl-cross releases on GitHub - not blocked in CI
                    BASE_URL="https://github.com/cross-tools/musl-cross/releases/latest/download"
                    TARBALL="${{ matrix.target }}.tar.xz"
                    echo "Downloading ${TARBALL} ..."
                    wget --timeout=120 --tries=3 -q "${BASE_URL}/${TARBALL}"
                    tar xf "${TARBALL}"
                    echo "$PWD/${{ matrix.target }}/bin" >> $GITHUB_PATH
                  fi

            - name: Verify compiler
              run: ${{ matrix.muslcc }} --version

            - name: Build PCRE1 static
              run: MUSLCC=${{ matrix.muslcc }} MUSL_TARGET=${{ matrix.host }} nim installPcre

            - name: Build PCRE2 static
              run: MUSLCC=${{ matrix.muslcc }} MUSL_TARGET=${{ matrix.host }} nim installPcre2

            - name: Create gcc wrapper for aarch64
              if: startsWith(matrix.target, 'aarch64')
              run: |
                  mkdir -p $HOME/.local/bin
                  echo '#!/bin/sh' > $HOME/.local/bin/aarch64-linux-gnu-gcc
                  echo 'exec ${{ matrix.muslcc }} "$@"' >> $HOME/.local/bin/aarch64-linux-gnu-gcc
                  chmod +x $HOME/.local/bin/aarch64-linux-gnu-gcc
                  echo "$HOME/.local/bin" >> $GITHUB_PATH

            - name: Create gcc wrapper for armv7
              if: startsWith(matrix.target, 'armv7')
              run: |
                  mkdir -p $HOME/.local/bin
                  echo '#!/bin/sh' > $HOME/.local/bin/arm-linux-gnueabihf-gcc
                  echo 'exec ${{ matrix.muslcc }} "$@"' >> $HOME/.local/bin/arm-linux-gnueabihf-gcc
                  chmod +x $HOME/.local/bin/arm-linux-gnueabihf-gcc
                  echo "$HOME/.local/bin" >> $GITHUB_PATH

            - name: Build static binary
              run: MUSLCC=${{ matrix.muslcc }} MUSL_TARGET=${{ matrix.host }} CPU=${{ matrix.nim_cpu }} nim static_release

            - name: Mark artifacts ready
              id: mark
              run: echo "artifacts_ready=true" >> $GITHUB_OUTPUT

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact }}
                  path: bin/catnap
                  retention-days: 30
